<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>800 — La Química del Aroma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    --oro: #c5a059;
    --oro-light: #d4b47a;
    --oro-dim: rgba(197,160,89,0.15);
    --bg: #111;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: rgba(255,255,255,0.07);
    --text: #ede8e0;
    --text-dim: rgba(237,232,224,0.45);
    --green: #5cb88a;
    --red: #e06060;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
overflow-x: hidden;
}

/* ── SCREENS ── */
.screen {
display: none;
min-height: 100vh;
padding: 0 0 40px;
animation: fadeUp 0.35s ease both;
}
.screen.active { display: block; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(14px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ── BACK NAV ── */
.topbar {
display: flex;
align-items: center;
padding: 20px 24px 0;
gap: 12px;
}
.btn-back {
background: none;
border: none;
color: var(–oro);
font-family: ‘DM Mono’, monospace;
font-size: 0.75em;
letter-spacing: 2px;
cursor: pointer;
padding: 0;
display: flex;
align-items: center;
gap: 6px;
}
.topbar-title {
font-size: 0.65em;
letter-spacing: 3px;
color: var(–text-dim);
text-transform: uppercase;
}

/* ══════════════════════════════
PANTALLA 1 — INICIO
══════════════════════════════ */
#screen-home {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 48px 28px 60px;
min-height: 100vh;
position: relative;
}

/* grain overlay */
#screen-home::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 0;
opacity: 0.6;
}

.home-content { position: relative; z-index: 1; width: 100%; max-width: 380px; }

.brand {
text-align: center;
margin-bottom: 52px;
}

.brand-number {
font-family: ‘Playfair Display’, serif;
font-size: 5.5em;
font-weight: 700;
color: var(–oro);
line-height: 1;
letter-spacing: -2px;
}

.brand-name {
font-family: ‘Playfair Display’, serif;
font-style: italic;
font-size: 0.95em;
color: var(–text-dim);
letter-spacing: 1px;
margin-top: 4px;
}

.brand-line {
width: 40px;
height: 1px;
background: var(–oro);
margin: 16px auto 0;
opacity: 0.4;
}

/* Method selector */
.step-label {
font-size: 0.6em;
letter-spacing: 3px;
color: var(–text-dim);
margin-bottom: 12px;
text-transform: uppercase;
}

.methods-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-bottom: 28px;
}

.method-btn {
padding: 14px 10px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
color: var(–text-dim);
font-family: ‘DM Mono’, monospace;
font-size: 0.72em;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.2s;
text-align: center;
}

.method-btn.selected {
background: var(–oro-dim);
border-color: var(–oro);
color: var(–oro);
}

/* Objective selector */
.objectives {
display: flex;
flex-direction: column;
gap: 8px;
margin-bottom: 32px;
}

.obj-btn {
display: flex;
align-items: center;
gap: 14px;
padding: 16px 18px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
cursor: pointer;
transition: all 0.2s;
text-align: left;
width: 100%;
}

.obj-btn.selected {
background: var(–oro-dim);
border-color: var(–oro);
}

.obj-emoji { font-size: 1.4em; }

.obj-info { flex: 1; }

.obj-name {
color: var(–text);
font-size: 0.8em;
letter-spacing: 1px;
display: block;
font-weight: 500;
}

.obj-btn.selected .obj-name { color: var(–oro); }

.obj-desc {
color: var(–text-dim);
font-size: 0.65em;
letter-spacing: 0.5px;
display: block;
margin-top: 2px;
}

.obj-check {
width: 18px;
height: 18px;
border-radius: 50%;
border: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: center;
font-size: 0.6em;
transition: all 0.2s;
flex-shrink: 0;
}

.obj-btn.selected .obj-check {
background: var(–oro);
border-color: var(–oro);
color: #111;
}

/* CTA */
.btn-preparar {
width: 100%;
padding: 18px;
background: var(–oro);
border: none;
border-radius: 16px;
font-family: ‘DM Mono’, monospace;
font-size: 0.8em;
font-weight: 500;
letter-spacing: 3px;
color: #111;
cursor: pointer;
transition: all 0.2s;
opacity: 0.35;
pointer-events: none;
}

.btn-preparar.ready {
opacity: 1;
pointer-events: auto;
}

.btn-preparar.ready:active { transform: scale(0.98); }

/* Mis recetas link */
.mis-recetas-link {
text-align: center;
margin-top: 24px;
}

.btn-mis-recetas {
background: none;
border: none;
font-family: ‘DM Mono’, monospace;
font-size: 0.65em;
letter-spacing: 2px;
color: var(–text-dim);
cursor: pointer;
text-decoration: underline;
text-underline-offset: 4px;
}

/* ══════════════════════════════
PANTALLA 2 — LISTA
══════════════════════════════ */
#screen-list { padding-bottom: 80px; }

.list-header {
padding: 28px 24px 20px;
border-bottom: 1px solid var(–border);
margin-bottom: 20px;
}

.list-combo {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 6px;
}

.combo-method {
font-family: ‘Playfair Display’, serif;
font-size: 1.6em;
color: var(–text);
}

.combo-sep { color: var(–text-dim); font-size: 0.8em; }

.combo-obj {
font-family: ‘Playfair Display’, serif;
font-style: italic;
font-size: 1.3em;
color: var(–oro);
}

.list-sub {
font-size: 0.6em;
letter-spacing: 2px;
color: var(–text-dim);
}

.recipe-cards {
padding: 0 20px;
display: flex;
flex-direction: column;
gap: 12px;
}

.rcard {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 18px;
padding: 20px;
cursor: pointer;
transition: all 0.2s;
display: flex;
align-items: center;
gap: 16px;
}

.rcard:active { transform: scale(0.99); background: var(–surface2); }

.rcard-left { flex: 1; }

.rcard-name {
font-family: ‘Playfair Display’, serif;
font-size: 1.2em;
color: var(–text);
margin-bottom: 5px;
line-height: 1.2;
}

.rcard-desc {
font-size: 0.65em;
color: var(–text-dim);
line-height: 1.5;
letter-spacing: 0.3px;
}

.rcard-meta {
display: flex;
gap: 6px;
margin-top: 10px;
flex-wrap: wrap;
}

.rpill {
font-size: 0.58em;
padding: 3px 8px;
border-radius: 6px;
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text-dim);
letter-spacing: 0.5px;
}

.rpill span { color: var(–oro); }

.rcard-arrow {
color: var(–oro);
font-size: 1em;
opacity: 0.5;
flex-shrink: 0;
}

/* user card */
.rcard.user-card {
border-left: 3px solid var(–green);
}

.rcard-badge {
font-size: 0.55em;
padding: 2px 7px;
border-radius: 5px;
margin-left: 8px;
vertical-align: middle;
letter-spacing: 1px;
}
.badge-800 { background: var(–oro-dim); color: var(–oro); border: 1px solid rgba(197,160,89,0.3); }
.badge-user { background: rgba(92,184,138,0.1); color: var(–green); border: 1px solid rgba(92,184,138,0.3); }

.section-divider {
padding: 24px 24px 10px;
font-size: 0.6em;
letter-spacing: 3px;
color: var(–text-dim);
display: flex;
align-items: center;
gap: 10px;
}
.section-divider::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

/* FAB */
.fab {
position: fixed;
bottom: 28px;
right: 24px;
width: 50px;
height: 50px;
border-radius: 50%;
background: var(–oro);
border: none;
color: #111;
font-size: 1.5em;
cursor: pointer;
box-shadow: 0 4px 24px rgba(197,160,89,0.35);
display: flex;
align-items: center;
justify-content: center;
z-index: 10;
transition: transform 0.2s;
}
.fab:active { transform: scale(0.93); }

/* empty */
.empty {
text-align: center;
padding: 36px 20px;
color: var(–text-dim);
font-size: 0.7em;
letter-spacing: 1px;
line-height: 1.8;
}

/* ══════════════════════════════
PANTALLA 3 — DETALLE
══════════════════════════════ */
#screen-detail { padding-bottom: 60px; }

.detail-hero {
padding: 28px 24px 24px;
border-bottom: 1px solid var(–border);
}

.detail-name {
font-family: ‘Playfair Display’, serif;
font-size: 2em;
line-height: 1.15;
color: var(–text);
margin-bottom: 8px;
}

.detail-desc {
font-size: 0.72em;
color: var(–text-dim);
line-height: 1.7;
margin-bottom: 16px;
}

.detail-pills {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.detail-pill {
font-size: 0.62em;
padding: 5px 12px;
border-radius: 8px;
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text-dim);
letter-spacing: 0.5px;
}
.detail-pill span { color: var(–oro); }

/* flavor bars */
.flavor-section {
padding: 20px 24px;
border-bottom: 1px solid var(–border);
}

.flavor-row {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 10px;
}
.flavor-row:last-child { margin-bottom: 0; }

.flabel {
font-size: 0.58em;
letter-spacing: 2px;
color: var(–text-dim);
width: 56px;
flex-shrink: 0;
}

.fbar {
flex: 1;
height: 2px;
background: var(–border);
border-radius: 2px;
overflow: hidden;
}

.ffill {
height: 100%;
background: linear-gradient(90deg, var(–oro-dim) 0%, var(–oro) 100%);
border-radius: 2px;
transition: width 0.6s cubic-bezier(.23,1,.32,1);
}

/* steps */
.steps-section {
padding: 20px 24px;
}

.steps-title {
font-size: 0.6em;
letter-spacing: 3px;
color: var(–text-dim);
margin-bottom: 16px;
}

.step {
display: flex;
gap: 14px;
margin-bottom: 18px;
position: relative;
}

.step:not(:last-child)::after {
content: ‘’;
position: absolute;
left: 13px;
top: 28px;
bottom: -10px;
width: 1px;
background: var(–border);
}

.step-dot {
width: 28px;
height: 28px;
border-radius: 50%;
border: 1px solid var(–oro-dim);
background: var(–surface);
display: flex;
align-items: center;
justify-content: center;
font-size: 0.6em;
color: var(–oro);
flex-shrink: 0;
z-index: 1;
}

.step-body { flex: 1; padding-top: 4px; }

.step-title {
font-size: 0.7em;
letter-spacing: 1.5px;
color: var(–oro);
margin-bottom: 4px;
}

.step-desc {
font-family: ‘Playfair Display’, serif;
font-size: 0.92em;
color: var(–text-dim);
line-height: 1.6;
}

.step-desc strong { color: var(–text); font-weight: 400; }

/* timer */
.timer-section {
margin: 8px 24px 0;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px;
padding: 24px 20px 20px;
}

.timer-label {
font-size: 0.58em;
letter-spacing: 3px;
color: var(–text-dim);
text-align: center;
margin-bottom: 8px;
}

.timer-meta {
font-size: 0.62em;
color: var(–text-dim);
text-align: center;
margin-bottom: 4px;
letter-spacing: 1px;
}

.timer-meta span { color: var(–oro); }

#timer-display {
font-family: ‘Playfair Display’, serif;
font-size: 4em;
text-align: center;
color: var(–text);
letter-spacing: 4px;
line-height: 1;
margin: 8px 0 16px;
transition: color 0.3s;
}

#timer-display.done { color: var(–oro); }

.timer-btns {
display: flex;
gap: 8px;
}

.btn-timer-start {
flex: 2;
padding: 14px;
background: var(–oro);
border: none;
border-radius: 12px;
font-family: ‘DM Mono’, monospace;
font-size: 0.72em;
font-weight: 500;
letter-spacing: 2px;
color: #111;
cursor: pointer;
transition: all 0.2s;
}

.btn-timer-reset {
flex: 1;
padding: 14px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 12px;
font-family: ‘DM Mono’, monospace;
font-size: 0.72em;
letter-spacing: 2px;
color: var(–text-dim);
cursor: pointer;
}

/* ══════════════════════════════
PANTALLA 4 — MIS RECETAS
══════════════════════════════ */
#screen-myrecipes { padding-bottom: 100px; }

/* ══════════════════════════════
PANTALLA 5 — NUEVA RECETA
══════════════════════════════ */
#screen-new { padding-bottom: 60px; }

.new-body { padding: 20px 24px; }

.fgroup { margin-bottom: 18px; }

.flabel-form {
display: block;
font-size: 0.58em;
letter-spacing: 2.5px;
color: var(–oro);
margin-bottom: 7px;
}

.finput {
width: 100%;
padding: 13px 14px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.78em;
letter-spacing: 0.5px;
transition: border-color 0.2s;
}

.finput:focus { outline: none; border-color: var(–oro-dim); }
.finput::placeholder { color: var(–text-dim); }

textarea.finput { resize: vertical; min-height: 72px; line-height: 1.6; }

.frow { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

.flavor-form {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 16px;
}

.sl-row {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 12px;
}
.sl-row:last-child { margin-bottom: 0; }

.sl-label {
font-size: 0.58em;
letter-spacing: 1.5px;
color: var(–text-dim);
width: 56px;
flex-shrink: 0;
}

input[type=range] {
flex: 1;
appearance: none;
height: 2px;
background: var(–border);
border-radius: 2px;
outline: none;
cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
appearance: none;
width: 16px;
height: 16px;
border-radius: 50%;
background: var(–oro);
cursor: pointer;
transition: transform 0.15s;
}
input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }

.sl-val {
font-size: 0.7em;
color: var(–oro);
width: 14px;
text-align: right;
}

.btn-save {
width: 100%;
padding: 16px;
background: var(–green);
border: none;
border-radius: 14px;
font-family: ‘DM Mono’, monospace;
font-size: 0.78em;
font-weight: 500;
letter-spacing: 3px;
color: #111;
cursor: pointer;
margin-top: 8px;
transition: opacity 0.2s;
}
.btn-save:active { opacity: 0.85; }

</style>
</head>

    <div class="fgroup">
        <label class="flabel-form">NOMBRE</label>
        <input class="finput" type="text" id="f-nombre" placeholder="Ej: Mi V60 de domingo">

    <div class="fgroup">

        {t:'EXTRACCIÓN', d:'Extrae normalmente. El blend se comporta como un <strong>café equilibrado</strong>.'},
        {t:'EXPERIMENTAR', d:'Prueba distintas proporciones. <strong>Anota la que más te guste</strong>.'}
      ]}
    ]
  }
};

// ── STATE ─────────────────────────────────────────────
let state = {
  method: null,
  obj: null,
  currentReceta: null,
  fromMyRecipes: false
};

// timer
let timerInterval = null, elapsedMs = 0, startTs = 0;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// ── NAVIGATION ────────────────────────────────────────
function goTo(screenId) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const s = document.getElementById(screenId);
  s.style.display = 'block';
  requestAnimationFrame(() => s.classList.add('active'));

  if (screenId === 'screen-myrecipes') renderMyRecipes();
  window.scrollTo(0, 0);
}

// ── HOME ──────────────────────────────────────────────
function selectMethod(btn, val) {
  document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.method = val;
  updateCTA();
}

function selectObj(btn, val) {
  document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.obj = val;
  updateCTA();
}

function updateCTA() {
  const btn = document.getElementById('btn-preparar');
  if (state.method && state.obj) btn.classList.add('ready');
  else btn.classList.remove('ready');
}

function goToList() {
  if (!state.method || !state.obj) return;
  state.fromMyRecipes = false;

  const objLabels = { dulce: 'Dulce 🍯', acido: 'Ácido 🍋', balanceado: 'Balanceado ⚖️' };
  const methodLabels = { V60:'Hario V60', AeroPress:'AeroPress', Chemex:'Chemex', Prensa:'Prensa Francesa', EvaSolo:'Eva Solo', Espresso:'Espresso', Moka:'Moka Italiana' };

  document.getElementById('lc-method').textContent = methodLabels[state.method];
  document.getElementById('lc-obj').textContent = objLabels[state.obj];

  renderCuratedList();
  renderUserListForCombo();
  goTo('screen-list');
}

function renderCuratedList() {
  const recetas = (RECETAS[state.method] || {})[state.obj] || [];
  const cont = document.getElementById('curated-cards');
  cont.innerHTML = recetas.map((r, i) => rcardHTML(r, 'curada', i)).join('');
}

function renderUserListForCombo() {
  const all = getUserRecetas();
  const filtered = all.filter(r => r.metodo === state.method && r.objetivo === state.obj);
  const cont = document.getElementById('user-cards');
  const div = document.getElementById('user-divider');

  if (filtered.length === 0) {
    div.style.display = 'none';
    cont.innerHTML = '';
    return;
  }
  div.style.display = 'flex';
  cont.innerHTML = filtered.map((r, i) => rcardHTML(r, 'user', i)).join('');
}

function rcardHTML(r, tipo, i) {
  const isUser = tipo === 'user';
  return `<div class="rcard ${isUser ? 'user-card' : ''}" onclick="openDetail('${tipo}',${i})">
    <div class="rcard-left">
      <div class="rcard-name">${r.nombre} <span class="rcard-badge ${isUser ? 'badge-user' : 'badge-800'}">${isUser ? 'MÍA' : '800'}</span></div>
      <div class="rcard-desc">${r.desc}</div>
      <div class="rcard-meta">
        <div class="rpill">RATIO <span>1:${r.ratio}</span></div>
        <div class="rpill">TEMP <span>${r.temp}</span></div>
        <div class="rpill">TIEMPO <span>${r.tiempo}</span></div>
      </div>
    </div>
    <div class="rcard-arrow">›</div>
  </div>`;
}

// ── DETAIL ────────────────────────────────────────────
function openDetail(tipo, idx) {
  let receta;
  if (tipo === 'curada') {
    receta = (RECETAS[state.method] || {})[state.obj]?.[idx];
  } else {
    const all = getUserRecetas().filter(r => r.metodo === state.method && r.objetivo === state.obj);
    receta = all[idx];
  }
  if (!receta) return;
  state.currentReceta = receta;

  document.getElementById('d-name').textContent = receta.nombre;
  document.getElementById('d-desc').textContent = receta.desc;

  document.getElementById('d-pills').innerHTML = `
    <div class="detail-pill">RATIO <span>1:${receta.ratio}</span></div>
    <div class="detail-pill">TEMP <span>${receta.temp}</span></div>
    <div class="detail-pill">TIEMPO <span>${receta.tiempo}</span></div>
  `;

  const s = receta.sabor || {d:3,a:3,c:3};
  document.getElementById('d-flavor').innerHTML = `
    ${fbarHTML('DULZOR', s.d || s.dulzor || 3)}
    ${fbarHTML('ACIDEZ', s.a || s.acidez || 3)}
    ${fbarHTML('CUERPO', s.c || s.cuerpo || 3)}
  `;

  const pasos = receta.pasos || [];
  document.getElementById('d-steps').innerHTML = pasos.map((p, i) => `
    <div class="step">
      <div class="step-dot">${i+1}</div>
      <div class="step-body">
        <div class="step-title">${p.t}</div>
        <div class="step-desc">${p.d}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('t-meta').textContent = receta.tiempo;
  resetTimer();
  goTo('screen-detail');
}

function openDetailFromMine(idx) {
  const all = getUserRecetas();
  const receta = all[idx];
  if (!receta) return;
  state.method = receta.metodo;
  state.obj = receta.objetivo;
  state.fromMyRecipes = true;
  openDetail('user', getUserRecetas().filter(r => r.metodo === receta.metodo && r.objetivo === receta.objetivo).indexOf(receta));

  document.getElementById('detail-back').onclick = () => goTo('screen-myrecipes');
}

function fbarHTML(label, val) {
  return `<div class="flavor-row">
    <div class="flabel">${label}</div>
    <div class="fbar"><div class="ffill" style="width:${(val/5)*100}%"></div></div>
  </div>`;
}

// ── TIMER ─────────────────────────────────────────────
function toggleTimer() {
  if (audioCtx) audioCtx.resume();
  else audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  if (!timerInterval) {
    startTs = Date.now() - elapsedMs;
    timerInterval = setInterval(() => {
      elapsedMs = Date.now() - startTs;
      const m = Math.floor(elapsedMs / 60000);
      const s = Math.floor((elapsedMs % 60000) / 1000);
      const str = pad(m) + ':' + pad(s);
      document.getElementById('timer-display').textContent = str;

      const meta = document.getElementById('t-meta').textContent;
      if (str === meta) {
        document.getElementById('timer-display').classList.add('done');
        beep();
      }
    }, 100);
    document.getElementById('t-start').textContent = 'PAUSAR';
    document.getElementById('t-start').style.background = '#e06060';
  } else {
    clearInterval(timerInterval); timerInterval = null;
    document.getElementById('t-start').textContent = 'CONTINUAR';
    document.getElementById('t-start').style.background = 'var(--oro)';
  }
}

function resetTimer() {
  clearInterval(timerInterval); timerInterval = null; elapsedMs = 0;
  document.getElementById('timer-display').textContent = '00:00';
  document.getElementById('timer-display').classList.remove('done');
  const btn = document.getElementById('t-start');
  if (btn) { btn.textContent = 'INICIAR'; btn.style.background = 'var(--oro)'; }
}

function beep() {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = 660;
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(); osc.stop(ctx.currentTime + 0.6);
  } catch(e) {}
}

function pad(n) { return n.toString().padStart(2,'0'); }

// ── MY RECIPES ────────────────────────────────────────
function getUserRecetas() {
  return JSON.parse(localStorage.getItem('recetas800') || '[]');
}

function renderMyRecipes() {
  const all = getUserRecetas();
  const cont = document.getElementById('all-user-cards');
  if (all.length === 0) {
    cont.innerHTML = `<div class="empty">Aún no tienes recetas guardadas.<br><br>Crea la primera con el botón +</div>`;
    return;
  }
  const methodLabels = { V60:'V60', AeroPress:'AeroPress', Chemex:'Chemex', Prensa:'Prensa Francesa', EvaSolo:'Eva Solo', Espresso:'Espresso', Moka:'Moka' };
  const objEmoji = { dulce:'🍯', acido:'🍋', balanceado:'⚖️' };
  cont.innerHTML = all.map((r, i) => `
    <div class="rcard user-card" onclick="openDetailFromMine(${i})">
      <div class="rcard-left">
        <div class="rcard-name">${r.nombre}</div>
        <div class="rcard-desc" style="margin-bottom:6px">${methodLabels[r.metodo] || r.metodo} ${objEmoji[r.objetivo] || ''}</div>
        <div class="rcard-desc">${r.desc}</div>
        <div class="rcard-meta">
          <div class="rpill">1:${r.ratio}</div>
          <div class="rpill">${r.temp}</div>
          <div class="rpill">${r.tiempo}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
        <div class="rcard-arrow">›</div>
        <button onclick="deleteReceta(event,${i})" style="background:none;border:none;color:#e06060;font-size:0.75em;letter-spacing:1px;cursor:pointer;font-family:'DM Mono',monospace;">✕</button>
      </div>
    </div>
  `).join('');
}

function deleteReceta(e, idx) {
  e.stopPropagation();
  const all = getUserRecetas();
  all.splice(idx, 1);
  localStorage.setItem('recetas800', JSON.stringify(all));
  renderMyRecipes();
}

// ── NEW RECIPE ────────────────────────────────────────
function updSl(el, id) {
  document.getElementById(id).textContent = el.value;
}

function saveReceta() {
  const nombre = document.getElementById('f-nombre').value.trim();
  if (!nombre) { alert('Ponle un nombre a la receta'); return; }

  const receta = {
    nombre,
    metodo: document.getElementById('f-metodo').value,
    objetivo: document.getElementById('f-obj').value,
    desc: document.getElementById('f-desc').value || 'Receta personalizada.',
    ratio: parseInt(document.getElementById('f-ratio').value) || 15,
    temp: document.getElementById('f-temp').value || '--',
    tiempo: document.getElementById('f-tiempo').value || '00:00',
    sabor: {
      d: parseInt(document.querySelector('#screen-new input[type=range]:nth-of-type(1)').value),
      a: parseInt(document.querySelector('#screen-new input[type=range]:nth-of-type(2)').value),
      c: parseInt(document.querySelector('#screen-new input[type=range]:nth-of-type(3)').value),
    },
    pasos: []
  };

  const all = getUserRecetas();
  all.push(receta);
  localStorage.setItem('recetas800', JSON.stringify(all));

  document.getElementById('f-nombre').value = '';
  document.getElementById('f-desc').value = '';

  state.method = receta.metodo;
  state.obj = receta.objetivo;
  goTo('screen-myrecipes');
}

// init
window.onload = () => {
  document.getElementById('screen-home').style.display = 'flex';
};
</script>
