<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación Barista Pro | Alertas</title>
    <style>
        :root { --gold: #c5a059; --dark-bg: #1a1a1a; --card-bg: #2d2d2d; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark-bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .barista-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 25px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; border: 1px solid #444; }
        
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; object-fit: cover; }
        h2 { color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin: 5px 0; }
        #molienda-info { font-style: italic; color: #aaa; font-size: 0.85em; margin-bottom: 20px; min-height: 1.2em; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 5px; color: var(--gold); }
        
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #3d3d3d; color: white; font-size: 1em; box-sizing: border-box; }
        
        .timer-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-top: 20px; }
        .timer-display { font-size: 3.5em; font-family: monospace; margin: 10px 0; color: white; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-start { background: var(--gold); color: #1a1a1a; }
        .btn-reset { background: #444; color: white; }
        
        .active-timer { color: var(--gold); text-shadow: 0 0 10px rgba(197, 160, 89, 0.5); }
    </style>
</head>
<body>

<div class="barista-card">
    <img src="https://i.ibb.co/LST60Xp/coffee-logo.jpg" alt="Café" class="profile-pic">
    <h2>Estación Barista</h2>
    <div id="molienda-info">Molienda: Media-Fina (como sal fina)</div>

    <div class="input-group">
        <label>Cafetera:</label>
        <select id="metodo" onchange="actualizarGuia()">
            <option value="15">Hario V60</option>
            <option value="15">AeroPress</option>
            <option value="16">Chemex</option>
            <option value="12">Prensa Francesa</option>
            <option value="2">Espresso</option>
        </select>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group">
            <label>Café (g):</label>
            <input type="number" id="cafe" value="20" oninput="calcularAgua()">
        </div>
        <div class="input-group">
            <label>Ratio (1:X):</label>
            <input type="number" id="ratio" value="15" oninput="calcularAgua()">
        </div>
    </div>

    <div style="font-size: 1.2em; color: var(--gold); font-weight: bold; margin-bottom: 15px;">
        Total Agua: <span id="agua-total">300g</span>
    </div>

    <div class="timer-section">
        <label style="text-align: center; display: block;">Meta de Tiempo (Min:Seg)</label>
        <div style="display: flex; justify-content: center; gap: 5px; margin-bottom: 10px;">
            <input type="number" id="targetMin" value="02" style="width: 60px; text-align: center;">
            <span style="font-size: 1.5em;">:</span>
            <input type="number" id="targetSeg" value="30" style="width: 60px; text-align: center;">
        </div>
        
        <div class="timer-display" id="timer">00:00</div>
        
        <div class="btn-group">
            <button class="btn-start" onclick="toggleTimer()" id="btnStart">Iniciar</button>
            <button class="btn-reset" onclick="resetTimer()">Resetear</button>
        </div>
    </div>
</div>

<script>
    // Configuración de audio (Beep sintético para no cargar archivos externos)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(frequency, duration, type) {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = type || 'sine';
        oscillator.frequency.value = frequency;
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        oscillator.stop(audioCtx.currentTime + duration);
    }

    const guiasMolienda = {
        "Hario V60": "Media-Fina (como sal fina)",
        "AeroPress": "Fina a Media",
        "Chemex": "Media-Gruesa",
        "Prensa Francesa": "Gruesa (pimienta)",
        "Espresso": "Extra Fina"
    };

    function actualizarGuia() {
        const select = document.getElementById("metodo");
        const metodo = select.options[select.selectedIndex].text;
        document.getElementById("molienda-info").innerText = "Molienda: " + guiasMolienda[metodo];
        document.getElementById("ratio").value = select.value;
        calcularAgua();
    }

    function calcularAgua() {
        const cafe = document.getElementById("cafe").value;
        const ratio = document.getElementById("ratio").value;
        document.getElementById("agua-total").innerText = (cafe * ratio) + "g";
    }

    let tiempo = 0;
    let intervalo = null;

    function toggleTimer() {
        const btn = document.getElementById("btnStart");
        if (intervalo) {
            clearInterval(intervalo);
            intervalo = null;
            btn.innerText = "Continuar";
            document.getElementById("timer").classList.remove("active-timer");
        } else {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById("timer").classList.add("active-timer");
            intervalo = setInterval(() => {
                tiempo++;
                verificarAlertas();
                actualizarDisplay();
            }, 1000);
            btn.innerText = "Pausar";
        }
    }

    function verificarAlertas() {
        const tMin = parseInt(document.getElementById("targetMin").value) || 0;
        const tSeg = parseInt(document.getElementById("targetSeg").value) || 0;
        const targetTotal = (tMin * 60) + tSeg;

        // Pito corto cada minuto
        if (tiempo > 0 && tiempo % 60 === 0 && tiempo !== targetTotal) {
            playBeep(880, 0.5, 'sine'); 
        }

        // Alarma final (doble pito fuerte)
        if (tiempo === targetTotal) {
            playBeep(1200, 1, 'square');
            setTimeout(() => playBeep(1200, 1, 'square'), 500);
            document.getElementById("timer").style.color = "#e74c3c";
        }
    }

    function resetTimer() {
        clearInterval(intervalo);
        intervalo = null;
        tiempo = 0;
        actualizarDisplay();
        document.getElementById("btnStart").innerText = "Iniciar";
        document.getElementById("timer").classList.remove("active-timer");
        document.getElementById("timer").style.color = "white";
    }

    function actualizarDisplay() {
        const mins = Math.floor(tiempo / 60).toString().padStart(2, '0');
        const secs = (tiempo % 60).toString().padStart(2, '0');
        document.getElementById("timer").innerText = `${mins}:${secs}`;
    }
</script>

</body>
</html>
