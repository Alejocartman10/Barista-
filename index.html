<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>800 La Química del Aroma</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .barista-card {
            background: #2d2d2d;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            max-width: 440px;
            width: 100%;
            text-align: center;
            border: 1px solid #444;
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c5a059;
            margin-bottom: 15px;
            background-color: #333;
        }

        h2 {
            color: #c5a059;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px 0;
            font-size: 1.4em;
        }

        .info-box {
            background: #383838;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85em;
            line-height: 1.4;
            border-left: 4px solid #c5a059;
            text-align: left;
        }

        .info-box strong { color: #c5a059; }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: #c5a059;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #3d3d3d;
            border: 1px solid #555;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            box-sizing: border-box;
        }

        .total-agua {
            font-size: 1.5em;
            color: #c5a059;
            font-weight: bold;
            margin: 15px 0;
            padding: 10px;
            border-top: 1px solid #444;
        }

        .timer-section {
            background: #252525;
            padding: 20px;
            border-radius: 15px;
            margin-top: 10px;
        }

        #display {
            font-size: 3.5em;
            font-family: monospace;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        .btn-container {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start { background: #c5a059; color: #1a1a1a; }
        .btn-reset { background: #444; color: white; }
        .active-timer { color: #c5a059 !important; text-shadow: 0 0 15px #c5a059 !important; }
    </style>
</head>
<body>

<div class="barista-card">
    <img src="IMG_5892.jpeg" alt="800 Logo" class="profile-pic">
    
    <h2>800 <span style="font-weight: normal; opacity: 0.8;">La Química del Aroma</span></h2>
    
    <div class="info-box" id="guia-metodo">
        <strong>Molienda:</strong> <span id="txt-molienda">Selecciona un método</span><br>
        <strong>Temperatura:</strong> <span id="txt-temp">--</span>
    </div>

    <div class="input-group" style="grid-template-columns: 1fr;">
        <div>
            <label>Método de Extracción:</label>
            <select id="metodo" onchange="actualizarMetodo()">
                <option value="V60">Hario V60</option>
                <option value="AeroPress">AeroPress</option>
                <option value="EvaSolo">Eva Solo</option>
                <option value="Prensa">Prensa Francesa</option>
                <option value="Chemex">Chemex</option>
                <option value="Espresso">Espresso</option>
                <option value="Moka">Moka Italiana</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <div>
            <label>Café (g):</label>
            <input type="number" id="cafe" value="20" oninput="calcular()">
        </div>
        <div>
            <label>Ratio (1:X):</label>
            <input type="number" id="ratio" value="15" oninput="calcular()">
        </div>
    </div>

    <div class="total-agua">Agua: <span id="resultado">300</span>g</div>

    <div class="timer-section">
        <label style="text-align:center; display:block">Meta: <span id="meta-display">02:30</span></label>
        <div id="display">00:00</div>
        <div class="btn-container">
            <button class="btn-start" id="startBtn" onclick="toggleTimer()">INICIAR</button>
            <button class="btn-reset" onclick="resetTimer()">RESETEAR</button>
        </div>
    </div>
</div>

<script>
    const configuraciones = {
        'V60': { 
            molienda: 'Media-fina (sal de mesa fina). Cuanto más fino, más lenta la extracción.',
            temp: '90–96°C', ratio: 15, tiempo: '02:30' 
        },
        'AeroPress': { 
            molienda: 'Media-fina (sal de mesa gruesa). Mucho margen para experimentar.',
            temp: '85–92°C', ratio: 16, tiempo: '01:30' 
        },
        'EvaSolo': { 
            molienda: 'Media (azúcar moreno granulado). Similar a la prensa con filtro de tela.',
            temp: '90–94°C', ratio: 15, tiempo: '04:00' 
        },
        'Prensa': { 
            molienda: 'Gruesa (sal marina gruesa o panela granulada). Clave para evitar amargor.',
            temp: '92–96°C', ratio: 12, tiempo: '04:00' 
        },
        'Chemex': { 
            molienda: 'Media-gruesa (entre sal marina y azúcar moreno). El filtro ya ralentiza el proceso.',
            temp: '90–96°C', ratio: 14, tiempo: '03:30' 
        },
        'Espresso': { 
            molienda: 'Muy fina (harina de maíz, casi polvo). Muy sensible a cada gramo.',
            temp: '90–93°C', ratio: 2, tiempo: '00:25' 
        },
        'Moka': { 
            molienda: 'Fina (maicena con algo de grano). Usa agua ya caliente en la base.',
            temp: '80–85°C (en base)', ratio: 10, tiempo: '01:00' 
        }
    };

    function calcular() {
        const c = parseFloat(document.getElementById('cafe').value) || 0;
        const r = parseFloat(document.getElementById('ratio').value) || 0;
        document.getElementById('resultado').innerText = Math.round(c * r);
    }

    function actualizarMetodo() {
        const m = document.getElementById('metodo').value;
        const conf = configuraciones[m];
        
        document.getElementById('txt-molienda').innerText = conf.molienda;
        document.getElementById('txt-temp').innerText = conf.temp;
        document.getElementById('ratio').value = conf.ratio;
        document.getElementById('meta-display').innerText = conf.tiempo;
        calcular();
    }

    let startTime, elapsedTime = 0, timerInterval;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep() {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = 600; osc.start();
        setTimeout(() => osc.stop(), 400);
    }

    function toggleTimer() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!timerInterval) {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                let m = Math.floor(elapsedTime / 60000);
                let s = Math.floor((elapsedTime % 60000) / 1000);
                let displayStr = m.toString().padStart(2,'0') + ":" + s.toString().padStart(2,'0');
                document.getElementById('display').innerText = displayStr;
                if (displayStr === document.getElementById('meta-display').innerText) {
                    document.getElementById('display').classList.add('active-timer');
                    beep();
                }
            }, 100);
            document.getElementById('startBtn').innerText = "PAUSAR";
            document.getElementById('startBtn').style.background = "#ff4444";
        } else {
            clearInterval(timerInterval); timerInterval = null;
            document.getElementById('startBtn').innerText = "CONTINUAR";
            document.getElementById('startBtn').style.background = "#c5a059";
        }
    }

    function resetTimer() {
        clearInterval(timerInterval); timerInterval = null; elapsedTime = 0;
        document.getElementById('display').innerText = "00:00";
        document.getElementById('display').classList.remove('active-timer');
        document.getElementById('startBtn').innerText = "INICIAR";
        document.getElementById('startBtn').style.background = "#c5a059";
    }

    window.onload = actualizarMetodo;
</script>
</body>
</html>
