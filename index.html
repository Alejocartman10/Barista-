<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>800 - La Química del Aroma</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .barista-card {
            background: #2d2d2d;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #444;
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c5a059;
            margin-bottom: 15px;
            background-color: #333;
        }

        h2 {
            color: #c5a059;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px 0;
            font-size: 1.5em;
        }

        #molienda-info {
            font-style: italic;
            color: #aaa;
            margin-bottom: 25px;
            font-size: 0.9em;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: #c5a059;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #3d3d3d;
            border: 1px solid #555;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            box-sizing: border-box;
        }

        .total-agua {
            font-size: 1.4em;
            color: #c5a059;
            font-weight: bold;
            margin: 20px 0;
            padding: 10px;
            border-top: 1px solid #444;
        }

        .timer-section {
            background: #252525;
            padding: 20px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .meta-inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .meta-inputs input {
            width: 65px;
            text-align: center;
            font-size: 1.2em;
        }

        #display {
            font-size: 3.5em;
            font-family: monospace;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        .btn-container {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1em;
        }

        .btn-start { background: #c5a059; color: #1a1a1a; }
        .btn-reset { background: #444; color: white; }
        button:active { transform: scale(0.95); }

        .active-timer { color: #c5a059 !important; text-shadow: 0 0 15px #c5a059 !important; }
    </style>
</head>
<body>

<div class="barista-card">
    <img src="IMG_5892.jpeg" alt="800 Logo" class="profile-pic">
    
    <h2>800 <span style="font-weight: normal; opacity: 0.8;">La Química del Aroma</span></h2>
    <div id="molienda-info">Molienda: Media-Fina (como sal fina)</div>

    <div class="input-group" style="grid-template-columns: 1fr;">
        <div>
            <label>Cafetera:</label>
            <select id="metodo" onchange="actualizarTodo()">
                <option value="V60">Hario V60</option>
                <option value="AeroPress">AeroPress</option>
                <option value="Prensa">Prensa Francesa</option>
                <option value="Chemex">Chemex</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <div>
            <label>Café (g):</label>
            <input type="number" id="cafe" value="20" oninput="calcularAgua()">
        </div>
        <div>
            <label>Ratio (1:X):</label>
            <input type="number" id="ratio" value="15" oninput="calcularAgua()">
        </div>
    </div>

    <div class="total-agua">Total Agua: <span id="resultado">300</span>g</div>

    <div class="timer-section">
        <label style="text-align:center">Meta de Tiempo (Min:Seg)</label>
        <div class="meta-inputs">
            <input type="number" id="metaMin" value="02" min="0" max="59">
            <span>:</span>
            <input type="number" id="metaSeg" value="30" min="0" max="59">
        </div>

        <div id="display">00:00</div>

        <div class="btn-container">
            <button class="btn-start" id="startBtn" onclick="toggleTimer()">INICIAR</button>
            <button class="btn-reset" onclick="resetTimer()">RESETEAR</button>
        </div>
    </div>
</div>

<script>
    // FÓRMULA DE CALCULO CORREGIDA
    function calcularAgua() {
        const grCafe = document.getElementById('cafe').value;
        const grRatio = document.getElementById('ratio').value;
        const total = Math.round(grCafe * grRatio);
        document.getElementById('resultado').innerText = total;
    }

    // ACTUALIZACIÓN DE MÉTODOS
    function actualizarTodo() {
        const metodo = document.getElementById('metodo').value;
        const info = document.getElementById('molienda-info');
        const metas = {
            'V60': { txt: 'Molienda: Media-Fina (como sal fina)', min: '02', seg: '30', r: 15 },
            'AeroPress': { txt: 'Molienda: Fina (como azúcar)', min: '01', seg: '30', r: 16 },
            'Prensa': { txt: 'Molienda: Gruesa (como sal marina)', min: '04', seg: '00', r: 12 },
            'Chemex': { txt: 'Molienda: Media (como arena gruesa)', min: '03', seg: '30', r: 14 }
        };
        
        info.innerText = metas[metodo].txt;
        document.getElementById('metaMin').value = metas[metodo].min;
        document.getElementById('metaSeg').value = metas[metodo].seg;
        document.getElementById('ratio').value = metas[metodo].r;
        calcularAgua();
    }

    // LÓGICA DEL CRONÓMETRO
    let startTime, elapsedTime = 0, timerInterval;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(freq = 600, duration = 400) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.start();
        setTimeout(() => osc.stop(), duration);
    }

    function timeToString(time) {
        let diffInMin = time / (1000 * 60);
        let mm = Math.floor(diffInMin);
        let diffInSec = (diffInMin - mm) * 60;
        let ss = Math.floor(diffInSec);
        return mm.toString().padStart(2, '0') + ":" + ss.toString().padStart(2, '0');
    }

    function toggleTimer() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        if (!timerInterval) {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(function() {
                elapsedTime = Date.now() - startTime;
                const currentStr = timeToString(elapsedTime);
                document.getElementById('display').innerText = currentStr;

                const mMin = document.getElementById('metaMin').value.padStart(2,'0');
                const mSeg = document.getElementById('metaSeg').value.padStart(2,'0');
                if (currentStr === (mMin + ":" + mSeg)) {
                    document.getElementById('display').classList.add('active-timer');
                    beep(); 
                }
            }, 1000);
            document.getElementById('startBtn').innerText = "PAUSAR";
            document.getElementById('startBtn').style.background = "#ff4444";
        } else {
            clearInterval(timerInterval);
            timerInterval = null;
            document.getElementById('startBtn').innerText = "CONTINUAR";
            document.getElementById('startBtn').style.background = "#c5a059";
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        elapsedTime = 0;
        document.getElementById('display').innerText = "00:00";
        document.getElementById('display').classList.remove('active-timer');
        document.getElementById('startBtn').innerText = "INICIAR";
        document.getElementById('startBtn').style.background = "#c5a059";
    }
</script>
</body>
</html>
